<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Counter — Fast Billing</title>
<style>
:root{
  --bg:#16181c; --panel:#1e2127; --panel2:#23262e; --line:#2e323b;
  --text:#e8e6e1; --dim:#8b8f98; --faint:#5a5e67;
  --cu:#d98e4a; --cu-bright:#f0a860; --cu-dark:#8a5527;
  --green:#7fb069; --red:#d9604a;
  --mono:'SF Mono',ui-monospace,'Cascadia Mono',Consolas,monospace;
  --sans:-apple-system,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;overflow:hidden}
#app{display:grid;grid-template-columns:1fr 400px;grid-template-rows:auto 1fr;height:100vh;gap:0}

/* header */
header{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:10px 18px;border-bottom:1px solid var(--line);background:var(--panel)}
.brand{font-family:var(--mono);font-size:13px;letter-spacing:2px;color:var(--cu);text-transform:uppercase;white-space:nowrap}
.brand b{color:var(--text);font-weight:600}
.searchwrap{flex:1;position:relative;display:flex;align-items:center}
#q{width:100%;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);
   font-size:19px;padding:11px 96px 11px 42px;outline:none;font-family:var(--sans);caret-color:var(--cu-bright)}
#q:focus{border-color:var(--cu-dark);box-shadow:0 0 0 3px rgba(217,142,74,.12)}
.searchwrap .icon{position:absolute;left:14px;color:var(--faint);font-size:16px;pointer-events:none}
#mic{position:absolute;right:10px;background:none;border:1px solid var(--line);border-radius:6px;color:var(--dim);
     padding:6px 12px;cursor:pointer;font-size:13px;font-family:var(--mono)}
#mic:hover{color:var(--cu-bright);border-color:var(--cu-dark)}
#mic.live{color:#fff;background:var(--red);border-color:var(--red);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.6}}
#normline{position:absolute;left:42px;bottom:-16px;font-family:var(--mono);font-size:11px;color:var(--faint);white-space:nowrap;overflow:hidden;max-width:70%}
#normline b{color:var(--cu);font-weight:400}
.mode{font-family:var(--mono);font-size:12px;color:var(--dim);border:1px solid var(--line);border-radius:6px;
      padding:7px 12px;cursor:pointer;user-select:none;white-space:nowrap}
.mode b{color:var(--cu-bright);font-weight:600}
.kbd{font-family:var(--mono);font-size:10px;color:var(--faint);border:1px solid var(--line);border-radius:4px;padding:1px 5px;margin-left:6px}

/* results */
#results{overflow-y:auto;padding:14px 18px 24px;position:relative}
#hint{color:var(--faint);font-size:13px;padding:30px 6px;line-height:2}
#hint .kbd{font-size:11px}
.row{display:flex;align-items:center;gap:14px;padding:9px 14px;border-radius:8px;cursor:pointer;border:1px solid transparent}
.row:hover{background:var(--panel)}
.row.sel{background:var(--panel2);border-color:var(--cu-dark)}
.row .name{flex:1;font-size:15px;line-height:1.35}
.row .name mark{background:none;color:var(--cu-bright);font-weight:600}
.row .unit{font-family:var(--mono);font-size:11px;color:var(--faint);min-width:44px;text-align:center;border:1px solid var(--line);border-radius:4px;padding:2px 4px}
.row .price{font-family:var(--mono);font-size:15px;color:var(--text);min-width:86px;text-align:right;font-variant-numeric:tabular-nums}
.row .price small{display:block;font-size:10px;color:var(--faint)}
.count{font-family:var(--mono);font-size:11px;color:var(--faint);padding:4px 14px 10px}

/* cart */
#cartpane{border-left:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;overflow:hidden}
#carthead{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)}
#carthead h2{font-size:13px;font-family:var(--mono);letter-spacing:1.5px;color:var(--dim);font-weight:500;text-transform:uppercase}
#clear{background:none;border:none;color:var(--faint);font-size:12px;cursor:pointer;font-family:var(--mono)}
#clear:hover{color:var(--red)}
#cart{flex:1;overflow-y:auto;padding:8px 10px}
.ci{display:grid;grid-template-columns:1fr auto;gap:2px 10px;padding:9px 8px;border-radius:8px;border:1px solid transparent}
.ci.active{background:var(--panel2);border-color:var(--line)}
.ci .n{font-size:13.5px;line-height:1.3;grid-column:1/3}
.ci .ctl{display:flex;align-items:center;gap:8px}
.ci button{width:24px;height:24px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--dim);cursor:pointer;font-size:14px;line-height:1}
.ci button:hover{color:var(--cu-bright);border-color:var(--cu-dark)}
.ci .qty{font-family:var(--mono);min-width:34px;text-align:center;font-size:14px}
.ci .u{font-family:var(--mono);font-size:10px;color:var(--faint)}
.ci .amt{font-family:var(--mono);font-size:14px;text-align:right;align-self:center;font-variant-numeric:tabular-nums}
.ci .rate{font-family:var(--mono);font-size:10.5px;color:var(--faint);text-align:right}
.ci .del{color:var(--faint);border:none;background:none;font-size:15px}
.ci .del:hover{color:var(--red)}
#empty{color:var(--faint);font-size:13px;text-align:center;padding:40px 20px;line-height:1.9}
#totals{border-top:1px solid var(--line);padding:14px 16px;background:var(--panel2)}
#totals .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;color:var(--dim);padding:3px 0}
#totals .grand{font-size:22px;color:var(--text);padding-top:8px}
#totals .grand b{color:var(--cu-bright);font-weight:600}
#printbtn{width:100%;margin-top:12px;background:var(--cu);border:none;border-radius:8px;color:#1a120a;
  font-size:15px;font-weight:600;padding:12px;cursor:pointer;font-family:var(--sans)}
#printbtn:hover{background:var(--cu-bright)}
#printbtn:disabled{background:var(--line);color:var(--faint);cursor:default}

/* toast */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--panel2);
  border:1px solid var(--cu-dark);color:var(--text);padding:10px 20px;border-radius:8px;font-size:14px;
  transition:transform .18s;z-index:50;font-family:var(--mono)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* print */
#bill{display:none}
@media print{
  body>#app,#toast{display:none!important}
  body{background:#fff;color:#000;overflow:visible}
  #bill{display:block;font-family:var(--mono);font-size:12px;color:#000;padding:10px;max-width:80mm}
  #bill h3{text-align:center;font-size:14px;margin-bottom:2px}
  #bill .sub{text-align:center;font-size:10px;margin-bottom:8px}
  #bill table{width:100%;border-collapse:collapse}
  #bill td,#bill th{padding:3px 2px;text-align:left;border-bottom:1px dashed #999;font-size:11px}
  #bill td:last-child,#bill th:last-child{text-align:right}
  #bill .tot{font-size:13px;font-weight:bold}
}
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">⚡ <b>Counter</b></div>
    <div class="searchwrap">
      <span class="icon">🔍</span>
      <input id="q" autocomplete="off" spellcheck="false" placeholder="Search item… try: 1.5 rajdhani, copper wire, 16a dp mcb">
      <button id="mic" title="Voice search (V)">🎙 voice</button>
      <div id="normline"></div>
    </div>
    <div class="mode" id="mode" title="Toggle price mode (F2)">mode <b id="modelabel">RP</b><span class="kbd">F2</span></div>
  </header>

  <main id="results"><div id="hint"></div></main>

  <aside id="cartpane">
    <div id="cartHead" style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--line)">
      <h2 style="font-size:13px;font-family:var(--mono);letter-spacing:1.5px;color:var(--dim);font-weight:500;text-transform:uppercase">Cart</h2>
      <button id="clear">clear ✕</button>
    </div>
    <div id="cart"><div id="empty">Cart is empty.<br>Search an item and press <span class="kbd">Enter</span> to add it.</div></div>
    <div id="totals">
      <div class="l"><span>Items</span><span id="tItems">0</span></div>
      <div class="l"><span>Quantity</span><span id="tQty">0</span></div>
      <div class="l grand"><span>Total</span><b id="tAmt">₹0</b></div>
      <button id="printbtn" disabled>Print bill <span class="kbd" style="color:#1a120a;border-color:#8a5527">Ctrl P</span></button>
    </div>
  </aside>
</div>
<div id="toast"></div>
<div id="bill"></div>

/* ---------- normalization dictionary (spoken/shorthand → catalog term) ---------- */
const ALIAS = {
  copper:'cu', kopper:'cu', tamba:'cu',
  aluminium:'al', aluminum:'al',
  rj:'rajdhani', rajdani:'rajdhani', rajdhaani:'rajdhani',
  gw:'gw', greatwhite:'gw', 'great-white':'gw',
  hv:'havells', havels:'havells', hawells:'havells',
  anchr:'anchor', anker:'anchor',
  switchboard:'board', swich:'switch', socket:'socket', soket:'socket',
  emcb:'mcb', 'm.c.b':'mcb', 'm.c.b.':'mcb',
  milimeter:'mm', millimetre:'mm', millimeter:'mm',
  ampere:'a', amp:'a', watt:'w', watts:'w',
  'single pole':'sp','double pole':'dp','triple pole':'tp','four pole':'fp',
  bandal:'bdl', bundle:'bdl', packet:'pkt', metre:'mtr', meter:'mtr',
  point:'.', 'one point five':'1.5', 'two point five':'2.5', 'zero point seven five':'0.75'
};
function normalize(raw){
  let s = ' '+raw.toLowerCase().trim()+' ';
  const applied=[];
  for(const [k,v] of Object.entries(ALIAS)){
    const re=new RegExp('(^|\\s)'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'(?=\\s|$)','g');
    if(re.test(s)){ s=s.replace(re,'$1'+v); applied.push(k+'→'+v); }
  }
  s=s.replace(/(\d)\s+point\s+(\d)/g,'$1.$2');
  return {text:s.trim(), applied};
}

/* ---------- tokenized fuzzy search ---------- */
function fuzzyWord(tok, word){
  if(word.startsWith(tok)) return 2;
  if(word.includes(tok)) return 1.4;
  if(tok.length>=4){                      /* allow 1 typo */
    let i=0,j=0,edits=0;
    while(i<tok.length&&j<word.length){
      if(tok[i]===word[j]){i++;j++;}
      else{edits++; if(edits>1)break;
        if(tok.length===word.length){i++;j++;}
        else if(tok.length<word.length){j++;}
        else{i++;}
      }
    }
    edits+=Math.abs((tok.length-i)-(word.length-j));
    if(edits<=1) return 1;
  }
  return 0;
}
function score(tokens, hay){
  const words = hay.split(/\s+/);
  let total=0;
  for(const t of tokens){
    let best=0;
    for(const w of words){ const s=fuzzyWord(t,w); if(s>best)best=s; if(best>=2)break; }
    if(best===0) return 0;               /* every token must match */
    total+=best;
  }
  return total;
}
function search(qraw){
  const {text}=normalize(qraw);
  const tokens=text.split(/\s+/).filter(Boolean);
  if(!tokens.length) return [];
  const out=[];
  for(let i=0;i<DATA.length;i++){
    const it=DATA[i];
    const hay=(it[0]+' '+it[1]).toLowerCase();
    const s=score(tokens,hay);
    if(s>0) out.push([s,i]);
  }
  out.sort((a,b)=>b[0]-a[0] || DATA[a[1]][0].length-DATA[b[1]][0].length);
  return out.slice(0,40).map(x=>x[1]);
}

/* ---------- highlight matched parts ---------- */
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function highlight(name, qraw){
  const {text}=normalize(qraw);
  const tokens=text.split(/\s+/).filter(t=>t.length>0);
  let html=esc(name);
  for(const t of tokens){
    const re=new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig');
    html=html.replace(re,'\u0001$1\u0002');
  }
  return html.replace(/\u0001/g,'<mark>').replace(/\u0002/g,'</mark>');
}

/* ---------- state ---------- */
let mode='rp';                 /* 'wp' | 'rp' */
let results=[]; let sel=0;
let cart=[];                   /* {i, qty} */
let activeCart=-1;

const $=id=>document.getElementById(id);
const fm=n=>'₹'+n.toLocaleString('en-IN');

/* ---------- render results ---------- */
function renderResults(){
  const q=$('q').value;
  const box=$('results');
  if(!q.trim()){
    box.innerHTML='<div id="hint">Start typing to search '+DATA.length.toLocaleString('en-IN')+' items.<br>'
      +'<span class="kbd">↑↓</span> navigate &nbsp; <span class="kbd">Enter</span> add to cart &nbsp; '
      +'<span class="kbd">F2</span> WP/RP &nbsp; <span class="kbd">+ −</span> qty of last item &nbsp; '
      +'<span class="kbd">Ctrl P</span> print bill &nbsp; <span class="kbd">Esc</span> clear</div>';
    return;
  }
  if(!results.length){
    box.innerHTML='<div id="hint">No match. Check spelling or try fewer words — brand, size or type is enough.</div>';
    return;
  }
  let h='<div class="count">'+results.length+' match'+(results.length>1?'es':'')+(results.length===40?' (top 40 shown)':'')+'</div>';
  results.forEach((idx,k)=>{
    const it=DATA[idx];
    const price=mode==='wp'?it[3]:it[4];
    h+='<div class="row'+(k===sel?' sel':'')+'" data-k="'+k+'">'
      +'<div class="name">'+highlight(it[0],q)+'</div>'
      +'<div class="unit">'+it[2]+'</div>'
      +'<div class="price">'+fm(price)+'<small>'+mode.toUpperCase()+' / '+it[2]+'</small></div>'
      +'</div>';
  });
  box.innerHTML=h;
  const s=box.querySelector('.row.sel');
  if(s) s.scrollIntoView({block:'nearest'});
  box.querySelectorAll('.row').forEach(r=>{
    r.onclick=()=>{sel=+r.dataset.k;addSel();};
    r.onmousemove=()=>{if(sel!==+r.dataset.k){sel=+r.dataset.k;renderResults();}};
  });
}

/* ---------- cart ---------- */
function addSel(){
  if(!results.length)return;
  const idx=results[sel];
  const ex=cart.find(c=>c.i===idx);
  if(ex)ex.qty++;
  else cart.push({i:idx,qty:1});
  activeCart=cart.findIndex(c=>c.i===idx);
  $('q').value=''; results=[]; sel=0;
  toast('Added — '+DATA[idx][0]);
  renderResults(); renderCart();
  $('q').focus();
}
function renderCart(){
  const box=$('cart');
  if(!cart.length){
    box.innerHTML='<div id="empty">Cart is empty.<br>Search an item and press <span class="kbd">Enter</span> to add it.</div>';
    $('printbtn').disabled=true;
  }else{
    let h='';
    cart.forEach((c,k)=>{
      const it=DATA[c.i];
      const rate=mode==='wp'?it[3]:it[4];
      h+='<div class="ci'+(k===activeCart?' active':'')+'" data-k="'+k+'">'
        +'<div class="n">'+esc(it[0])+'</div>'
        +'<div class="ctl">'
          +'<button data-a="dec">−</button><span class="qty">'+c.qty+'</span><button data-a="inc">+</button>'
          +'<span class="u">'+it[2]+'</span>'
          +'<button data-a="del" class="del">✕</button>'
        +'</div>'
        +'<div><div class="amt">'+fm(rate*c.qty)+'</div><div class="rate">'+fm(rate)+' × '+c.qty+'</div></div>'
        +'</div>';
    });
    box.innerHTML=h;
    $('printbtn').disabled=false;
    box.querySelectorAll('.ci').forEach(el=>{
      const k=+el.dataset.k;
      el.onclick=e=>{
        const a=e.target.dataset.a;
        activeCart=k;
        if(a==='inc')cart[k].qty++;
        else if(a==='dec'){cart[k].qty--; if(cart[k].qty<=0){cart.splice(k,1);activeCart=Math.min(activeCart,cart.length-1);}}
        else if(a==='del'){cart.splice(k,1);activeCart=Math.min(activeCart,cart.length-1);}
        renderCart();
      };
    });
  }
  let qty=0,amt=0;
  cart.forEach(c=>{const it=DATA[c.i];qty+=c.qty;amt+=(mode==='wp'?it[3]:it[4])*c.qty;});
  $('tItems').textContent=cart.length;
  $('tQty').textContent=qty;
  $('tAmt').textContent=fm(amt);
}

/* ---------- toast ---------- */
let toastT;
function toast(msg,ms){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),ms||1400);
}

/* ---------- mode toggle ---------- */
function toggleMode(){
  mode=mode==='wp'?'rp':'wp';
  $('modelabel').textContent=mode.toUpperCase();
  toast('Price mode: '+(mode==='wp'?'Wholesale':'Retail'));
  renderResults();renderCart();
}
$('mode').onclick=toggleMode;

/* ---------- print ---------- */
function printBill(){
  if(!cart.length)return;
  let rows='',amt=0;
  cart.forEach(c=>{
    const it=DATA[c.i];const rate=mode==='wp'?it[3]:it[4];const a=rate*c.qty;amt+=a;
    rows+='<tr><td>'+esc(it[0])+'</td><td>'+c.qty+' '+it[2]+'</td><td>'+fm(rate)+'</td><td>'+fm(a)+'</td></tr>';
  });
  const d=new Date();
  $('bill').innerHTML='<h3>ESTIMATE / BILL</h3>'
    +'<div class="sub">'+d.toLocaleDateString('en-IN')+' '+d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})
    +' · '+(mode==='wp'?'Wholesale':'Retail')+' rates</div>'
    +'<table><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Amt</th></tr>'+rows
    +'<tr class="tot"><td colspan="3">TOTAL</td><td>'+fm(amt)+'</td></tr></table>';
  window.print();
}
$('printbtn').onclick=printBill;
$('clear').onclick=()=>{cart=[];activeCart=-1;renderCart();$('q').focus();};

/* ---------- voice ---------- */
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
let rec=null,listening=false;
const MIC_ERR={
  'not-allowed':'Mic blocked. Click the 🔒/mic icon in the address bar and allow microphone.',
  'service-not-allowed':'Browser blocked speech here. Open via http://localhost or an https link, not by double-clicking the file.',
  'network':'Voice needs internet — recognition runs on Google servers. Typing still works offline.',
  'no-speech':'Heard nothing. Tap the mic and speak within a second or two.',
  'audio-capture':'No microphone found. Check that a mic is connected and not in use by another app.',
  'aborted':'Listening cancelled.'
};
if(SR){
  rec=new SR();rec.lang='en-IN';rec.interimResults=true;rec.continuous=false;
  rec.onstart=()=>{$('mic').textContent='● listening';toast('🎙 Listening… speak now',2500);};
  rec.onresult=e=>{
    const t=Array.from(e.results).map(r=>r[0].transcript).join(' ');
    $('q').value=t;onQuery();
  };
  rec.onerror=e=>{
    listening=false;$('mic').classList.remove('live');$('mic').textContent='🎙 voice';
    toast(MIC_ERR[e.error]||('Voice error: '+e.error),5000);
  };
  rec.onend=()=>{listening=false;$('mic').classList.remove('live');$('mic').textContent='🎙 voice';$('q').focus();};
}else{
  $('mic').style.display='none';
}
$('mic').onclick=async()=>{
  if(!rec)return;
  if(listening){rec.stop();return;}
  /* pre-flight: force the permission prompt & separate mic issues from speech-service issues */
  if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
    try{
      const st=await navigator.mediaDevices.getUserMedia({audio:true});
      st.getTracks().forEach(t=>t.stop());
    }catch(err){
      if(err.name==='NotAllowedError')toast('Mic permission denied. Click the icon left of the address bar → Microphone → Allow, then reload.',6000);
      else if(err.name==='NotFoundError')toast('No microphone detected on this device.',5000);
      else toast('Mic unavailable: '+err.name,5000);
      return;
    }
  }
  listening=true;$('mic').classList.add('live');
  try{rec.start();}
  catch(err){listening=false;$('mic').classList.remove('live');toast('Mic busy — wait a moment and try again.',4000);}
};

/* ---------- input & keys ---------- */
function onQuery(){
  const q=$('q').value;
  results=search(q);sel=0;
  const {applied}=normalize(q);
  $('normline').innerHTML=applied.length?('normalized: '+applied.map(a=>'<b>'+esc(a)+'</b>').join('  ')):'';
  renderResults();
}
$('q').addEventListener('input',onQuery);

document.addEventListener('keydown',e=>{
  if(e.key==='F2'){e.preventDefault();toggleMode();return;}
  if(e.ctrlKey&&(e.key==='p'||e.key==='P')){e.preventDefault();printBill();return;}
  const inSearch=document.activeElement===$('q');
  if(e.key==='ArrowDown'&&results.length){e.preventDefault();sel=Math.min(sel+1,results.length-1);renderResults();return;}
  if(e.key==='ArrowUp'&&results.length){e.preventDefault();sel=Math.max(sel-1,0);renderResults();return;}
  if(e.key==='Enter'&&inSearch&&results.length){e.preventDefault();addSel();return;}
  if(e.key==='Escape'){$('q').value='';results=[];onQuery();$('q').focus();return;}
  if((e.key==='+'||e.key==='=')&&!$('q').value&&activeCart>=0&&cart[activeCart]){e.preventDefault();cart[activeCart].qty++;renderCart();return;}
  if(e.key==='-'&&!$('q').value&&activeCart>=0&&cart[activeCart]){e.preventDefault();cart[activeCart].qty--;
    if(cart[activeCart].qty<=0){cart.splice(activeCart,1);activeCart=Math.min(activeCart,cart.length-1);}renderCart();return;}
  if(e.key==='v'&&!inSearch){$('mic').click();return;}
  if(!inSearch&&e.key.length===1&&!e.ctrlKey&&!e.altKey&&!e.metaKey){$('q').focus();}
});

renderResults();renderCart();$('q').focus();
</script>
